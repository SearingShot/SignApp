<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SignApp - Speech to Sign Language</title>
  <meta name="description" content="Real-time speech to sign language avatar powered by AI">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.158.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.158.0/examples/jsm/"
    }
  }
  </script>

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0c0a1a 0%, #1a1333 40%, #0d1b2a 100%);
      color: #e2e8f0;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
    }

    /* ── 3D Canvas ─────────────────────────────── */
    #avatar-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
    }

    /* ── Top Bar ───────────────────────────────── */
    #top-bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 28px;
      background: linear-gradient(180deg, rgba(12,10,26,0.9) 0%, transparent 100%);
    }

    .logo {
      font-weight: 700;
      font-size: 20px;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #a78bfa, #60a5fa);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .status-chip {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 500;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
      transition: all 0.3s ease;
    }

    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #4ade80;
      transition: background 0.3s;
    }

    .status-dot.recording {
      background: #ef4444;
      animation: pulse-dot 1s ease-in-out infinite;
    }

    .status-dot.processing {
      background: #f59e0b;
      animation: pulse-dot 0.6s ease-in-out infinite;
    }

    .status-dot.signing {
      background: #a78bfa;
      animation: pulse-dot 1.2s ease-in-out infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(1.3); }
    }

    /* ── Bottom Panel ──────────────────────────── */
    #bottom-panel {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 20;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding: 20px 28px 32px;
      background: linear-gradient(0deg, rgba(12,10,26,0.95) 0%, rgba(12,10,26,0.7) 60%, transparent 100%);
    }

    /* ── Transcript Area ───────────────────────── */
    #transcript-area {
      width: 100%;
      max-width: 640px;
      text-align: center;
      min-height: 50px;
    }

    .transcript-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #64748b;
      margin-bottom: 6px;
    }

    .transcript-text {
      font-size: 15px;
      color: #cbd5e1;
      line-height: 1.5;
      opacity: 0;
      transform: translateY(8px);
      transition: all 0.4s ease;
    }

    .transcript-text.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .gloss-tokens {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      justify-content: center;
      margin-top: 8px;
    }

    .gloss-token {
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      font-family: 'Inter', monospace;
      background: rgba(167,139,250,0.15);
      border: 1px solid rgba(167,139,250,0.25);
      color: #c4b5fd;
      transition: all 0.3s ease;
    }

    .gloss-token.active {
      background: rgba(167,139,250,0.35);
      border-color: #a78bfa;
      color: #fff;
      transform: scale(1.08);
      box-shadow: 0 0 12px rgba(167,139,250,0.3);
    }

    .gloss-token.done {
      opacity: 0.4;
    }

    /* ── Mic Button ────────────────────────────── */
    #mic-btn {
      width: 72px; height: 72px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #7c3aed, #3b82f6);
      box-shadow: 0 4px 24px rgba(124,58,237,0.4), 0 0 0 0 rgba(124,58,237,0);
      transition: all 0.3s ease;
      position: relative;
    }

    #mic-btn:hover {
      transform: scale(1.06);
      box-shadow: 0 6px 32px rgba(124,58,237,0.5);
    }

    #mic-btn:active { transform: scale(0.97); }

    #mic-btn.recording {
      background: linear-gradient(135deg, #ef4444, #dc2626);
      box-shadow: 0 4px 24px rgba(239,68,68,0.4);
      animation: pulse-ring 1.5s ease-out infinite;
    }

    #mic-btn.processing {
      background: linear-gradient(135deg, #f59e0b, #d97706);
      pointer-events: none;
      animation: spin-slow 2s linear infinite;
    }

    @keyframes pulse-ring {
      0% { box-shadow: 0 4px 24px rgba(239,68,68,0.4), 0 0 0 0 rgba(239,68,68,0.3); }
      100% { box-shadow: 0 4px 24px rgba(239,68,68,0.4), 0 0 0 20px rgba(239,68,68,0); }
    }

    @keyframes spin-slow {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .mic-icon {
      width: 28px; height: 28px;
      fill: white;
    }

    /* ── Audio Waveform Visualizer ──────────────── */
    #waveform {
      width: 200px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 3px;
      opacity: 0;
      transition: opacity 0.3s;
    }

    #waveform.active { opacity: 1; }

    .wave-bar {
      width: 3px;
      height: 8px;
      border-radius: 2px;
      background: #a78bfa;
      transition: height 0.1s ease;
    }

    /* ── Signing Progress ──────────────────────── */
    #sign-label {
      font-size: 13px;
      color: #94a3b8;
      font-weight: 500;
      opacity: 0;
      transition: opacity 0.3s;
    }

    #sign-label.visible { opacity: 1; }

    /* ── Text Input Area ────────────────────────── */
    #text-input-container {
      width: 100%;
      max-width: 500px;
      display: flex;
      gap: 10px;
      padding: 4px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      margin-bottom: 8px;
      transition: all 0.3s ease;
    }

    #text-input-container:focus-within {
      background: rgba(255,255,255,0.08);
      border-color: rgba(167,139,250,0.4);
      box-shadow: 0 0 15px rgba(167,139,250,0.1);
    }

    #text-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: #fff;
      padding: 10px 16px;
      font-family: inherit;
      font-size: 14px;
    }

    #text-input::placeholder { color: #64748b; }

    #send-btn {
      background: rgba(167,139,250,0.2);
      border: 1px solid rgba(167,139,250,0.3);
      color: #c4b5fd;
      padding: 0 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      transition: all 0.2s ease;
    }

    #send-btn:hover {
      background: rgba(167,139,250,0.3);
      color: #fff;
    }

    /* ── Controls Layout ────────────────────────── */
    .controls-row {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    /* ── Secondary Button (Replay) ──────────────── */
    .secondary-btn {
      width: 48px; height: 48px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.05);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
      color: #94a3b8;
    }

    .secondary-btn:hover {
      background: rgba(255,255,255,0.1);
      border-color: rgba(255,255,255,0.2);
      color: #fff;
      transform: translateY(-2px);
    }

    .secondary-btn:active { transform: translateY(0); }

    .secondary-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
      transform: none;
    }

    .btn-icon { width: 20px; height: 20px; fill: currentColor; }
  </style>
</head>

<body>

  <!-- Top Bar -->
  <div id="top-bar">
    <div class="logo">SignApp</div>
    <div class="status-chip">
      <span class="status-dot" id="status-dot"></span>
      <span id="status-text">Ready</span>
    </div>
  </div>

  <!-- Bottom Panel -->
  <div id="bottom-panel">

    <!-- Transcript -->
    <div id="transcript-area">
      <div class="transcript-label" id="transcript-label"></div>
      <div class="transcript-text" id="transcript-text"></div>
      <div class="gloss-tokens" id="gloss-tokens"></div>
    </div>

    <!-- Text Input -->
    <div id="text-input-container">
      <input type="text" id="text-input" placeholder="Or type something here..." autocomplete="off">
      <button id="send-btn">Send</button>
    </div>

    <!-- Waveform -->
    <div id="waveform"></div>

    <!-- Sign Progress -->
    <div id="sign-label"></div>

    <!-- Controls -->
    <div class="controls-row">
      <!-- Replay Button -->
      <button id="replay-btn" class="secondary-btn" title="Replay last signs" disabled>
        <svg class="btn-icon" viewBox="0 0 24 24">
          <path d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/>
        </svg>
      </button>

      <!-- Microphone Button -->
      <button id="mic-btn" title="Click to speak">
        <svg class="mic-icon" viewBox="0 0 24 24" id="mic-svg">
          <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5z"/>
          <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
        </svg>
      </button>

      <!-- Placeholder to balance the row if needed, or other future buttons -->
      <div style="width: 48px;"></div>
    </div>
  </div>

  <script type="module" src="./main.js"></script>

</body>
</html>
